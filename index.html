<!DOCTYPE html>
<html>
<head>
  <title>SBP Visualizer</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px;
      background: #f5f5f5;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 600px;
      margin: auto;
    }
    img {
      max-width: 100%;
      margin-top: 20px;
    }
    select, input {
      padding: 10px;
      margin-top: 10px;
      width: 80%;
    }
    button {
      margin-top: 15px;
      padding: 12px 20px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Try Our Colors in Your Space</h1>

    <input type="file" id="upload" accept="image/*"><br>

    <select id="color">
      <option value="gold">Calacatta Gold</option>
      <option value="white">Super White</option>
      <option value="grey">Classic Grey</option>
    </select><br>

    <button onclick="applyColor()">Apply Color</button>

    <div id="output"></div>
  </div>

  <script>
    function applyColor() {
      const file = document.getElementById('upload').files[0];
      if (!file) {
        alert("Upload an image first");
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById("output").innerHTML =
          "<h3>Preview</h3><img src='" + e.target.result + "' />";
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
